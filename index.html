<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER  ENAFUL Business</title>
    <style>
        :root { --primary: #00d2ff; --bg: #0d1117; --card: #161b22; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; padding: 15px; }
        .container { max-width: 450px; margin: auto; background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #30363d; }
        .business-badge { background: gold; color: black; padding: 2px 10px; border-radius: 5px; font-weight: bold; font-size: 10px; }
        .status-box { background: #0d1117; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid var(--primary); }
        .feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; font-size: 12px; }
        .bot-card { background: #21262d; padding: 10px; border-radius: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #30363d; background: #010409; color: white; box-sizing: border-box; }
        .btn-pay { width: 100%; background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>🚀 ENAFUL MAKER</h2>
        <span class="business-badge">BUSINESS v3.0</span>
    </div>
    
    <div class="status-box">
        <strong>Business Insights:</strong><br>
        <span>Running Bots: <b id="run">0</b></span> | <span>Revenue: <b style="color: #3fb950;">Active</b></span>
    </div>

    <input type="text" id="token" placeholder="Bot Token (e.g. 12345:ABC...)">
    <input type="text" id="emojis" placeholder="Input Emojis (Total 100 Supported)">

    <div class="feature-grid">
        <label><input type="checkbox" checked> ⚡ Fast React</label>
        <label><input type="checkbox" checked> 🛡️ Anti-Ban</label>
        <label><input type="checkbox" checked> 💬 Group/Inbox</label>
        <label><input type="checkbox" checked> 📊 Analytics</label>
    </div>

    <button class="btn-pay" onclick="handleBusiness()">CREATE BUSINESS BOT</button>

    <div style="margin-top: 20px;">
        <h4 style="font-size: 14px; color: var(--primary);">📂 Manage Your Business Bots</h4>
        <div id="activeList">
            <p style="font-size: 11px; color: #8b949e;">No active bots found. Create one to start.</p>
        </div>
    </div>
</div>

<script>
    function handleBusiness() {
        const token = document.getElementById('token').value;
        if(!token.includes(':')) { alert("Invalid Token!"); return; }
        
        document.getElementById('activeList').innerHTML = `
            <div class="bot-card">
                <span style="font-size: 12px;">${token.split(':')[0]}... [LIVE]</span>
                <span style="color: #3fb950; font-size: 10px;">● CONNECTED</span>
            </div>
        `;
        document.getElementById('run').innerText = "1";
        alert("Bot Business Server-এ আপনার বটটি সাকসেসফুলি কানেক্ট করা হয়েছে!");
    }
</script>

</body>
</html>
