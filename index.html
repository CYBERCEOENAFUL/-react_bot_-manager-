<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER  ENAFUL - Bot Manager</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --primary: #238636; --danger: #da3633; --purple: #8957e5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #c9d1d9; margin: 0; padding: 10px; }
        .app-container { max-width: 500px; margin: auto; }
        .header { display: flex; align-items: center; padding: 15px; background: var(--card); border-radius: 15px; margin-bottom: 10px; border: 1px solid #30363d; }
        .header img { width: 50px; border-radius: 50%; border: 2px solid var(--primary); margin-right: 15px; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-item { background: var(--purple); color: white; padding: 12px; border-radius: 10px; text-align: center; font-weight: bold; cursor: pointer; }
        
        .action-btn { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; text-align: left; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .btn-green { background: var(--primary); color: white; }
        .btn-red { background: var(--danger); color: white; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #30363d; background: #010409; color: white; box-sizing: border-box; }
       .footer-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #161b22; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #30363d; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <img src="https://telegra.ph/file/dc339352643a6d71f76d4.jpg" alt="Logo">
        <div>
            <h3 style="margin:0;">AUTO REACTION BOT</h3>
            <small style="color: #8b949e;">Owner: ENAFUL ❤️❤️❤️</small>
        </div>
    </div>

    <div class="stat-grid">
        <div class="stat-item" onclick="alert('Downloading Data...')">Download Users Data</div>
        <div class="stat-item" onclick="alert('Loading Stats...')">Statistics</div>
    </div>

    <button class="action-btn btn-green">Customize Channel Emoji <span>⚙️</span></button>
    <button class="action-btn btn-green">Customize Group Emoji <span>⚙️</span></button>
    <button class="action-btn btn-green">Customize Welcome Caption <span>📝</span></button>
    <button class="action-btn btn-green">Customize Welcome Photo <span>🖼️</span></button>

    <button class="action-btn btn-red">Disable Button Color <span>❌</span></button>
    <button class="action-btn btn-red">Disable Admin Panel Button <span>🔒</span></button>
    <button class="action-btn btn-red">Enable Force Join <span>📢</span></button>

    <div style="display:flex; gap:10px;">
        <button class="action-btn" style="background:#8957e5; color:white;">Normal Broadcast</button>
        <button class="action-btn" style="background:#8957e5; color:white;">Powerful Broadcast ↗️</button>
    </div>

    <input type="text" id="tokenInput" placeholder="Enter Bot Token to Deploy...">
    <button onclick="deploy()" style="width:100%; padding:15px; background:white; color:black; border-radius:10px; font-weight:bold; margin-bottom: 80px;">DEPLOY TO SERVER</button>
</div>

<div class="footer-nav">
    <span>🏠 Dashboard</span>
    <span style="font-weight:bold; color:var(--primary);">⚡ Commands</span>
    <span>📢 Broadcast</span>
</div>

<script>
    function deploy() {
        let t = document.getElementById('tokenInput').value;
        if(t) {
            alert("Deploying Bot to ENAFUL Business Server...");
        } else {
            alert("Please enter a token!");
        }
    }
</script>

</body>
</html>
