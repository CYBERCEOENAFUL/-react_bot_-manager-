<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER ENAFUL - Reaction Bot System</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --accent: #58a6ff;
            --success: #238636;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        /* প্রোফাইল সেকশন - মাস্টার ব্র্যান্ডিং */
        .profile-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .profile-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            margin-bottom: 10px;
        }

        .profile-name {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            margin: 5px 0;
        }

        .status-badge {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .stat-item {
            background: var(--bg);
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
            border: 1px solid var(--border);
        }

        /* মেইন মেকার কার্ড */
        .maker-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            text-align: center;
        }

        h2 {
            font-size: 18px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .input-group {
            margin: 20px 0;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #8b949e;
        }

        input {
            width: 100%;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #fff;
            box-sizing: border-box;
            outline: none;
        }

        .bot-link-box {
            background: var(--bg);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin: 15px 0;
            word-break: break-all;
            color: #58a6ff;
            font-family: monospace;
            display: none; /* শুরুতে লুকানো */
        }

        .btn-main {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #238636, #2ea043);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: block;
            transition: 0.3s;
        }

        .btn-main:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        .instruction {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            text-align: left;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-card">
        <img src="https://t.me/i/userpic/320/KING_OF_ENAFUL.jpg" alt="Profile" class="profile-img">
        <div class="profile-name">BOSS ENAFUL</div>
        <span class="status-badge">🔱 Master Developer</span>
        <div class="stats-grid">
            <div class="stat-item"><b>Level:</b> 1</div>
            <div class="stat-item"><b>XP:</b> 1/9</div>
        </div>
    </div>

    <div class="maker-card" id="contentCard">
        <h2 id="cardTitle">Reaction Bot Maker</h2>
        
        <div id="makerSection">
            <div class="input-group">
                <label>Bot Token</label>
                <input type="text" id="token" placeholder="8630520684:AAEYuZR...">
            </div>
            <button class="btn-main" onclick="createBot()">🚀 CREATE MY BOT</button>
        </div>

        <div id="userBotSection" style="display: none;">
            <p style="font-size: 14px; color: #8b949e;">আপনার বট সচল আছে। নিচের লিঙ্কটি ব্যবহার করুন।</p>
            <div class="bot-link-box" id="userBotLink" style="display: block;"></div>
            <a href="#" id="openBotBtn" class="btn-main">🚀 OPEN YOUR BOT</a>
        </div>

        <div class="instruction">
            <b id="insTitle">নির্দেশিকা:</b><br>
            <span id="insText">• @BotFather থেকে আপনার টোকেনটি নিয়ে এখানে পেস্ট করুন। আপনার বটের এডমিন প্যানেল অটো সেটআপ হয়ে যাবে।</span>
        </div>
    </div>
</div>

<script>
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const botName = urlParams.get('bot');

        // যদি URL-এ ?bot= থাকে, তবে ইউজার মোড দেখাবে
        if (botName) {
            document.getElementById('cardTitle').innerText = "Your Active Bot";
            document.getElementById('makerSection').style.display = "none";
            document.getElementById('userBotSection').style.display = "block";
            document.getElementById('userBotLink').innerText = "https://t.me/" + botName;
            document.getElementById('openBotBtn').href = "https://t.me/" + botName;
            
            document.getElementById('insTitle').innerText = "বট সেটিংস:";
            document.getElementById('insText').innerHTML = "• এই লিঙ্কটি আপনার ইউজারদের সাথে শেয়ার করুন।<br>• বটের এডমিন প্যানেল আপনার কমান্ডের মাধ্যমে পরিচালিত হবে।";
        }
    };

    function createBot() {
        let token = document.getElementById('token').value;
        if(token.length > 20 && token.includes(':')) {
            alert("সফল হয়েছে! আপনার রিঅ্যাকশন বটটি তৈরি করা হচ্ছে...");
        } else {
            alert("সঠিক বোট টোকেন প্রদান করুন!");
        }
    }
</script>

</body>
</html>
