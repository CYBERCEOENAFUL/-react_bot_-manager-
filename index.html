<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER ENAFUL - Premium Bot Manager</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #090d16;
            --card: #111827;
            --primary: #10b981;
            --danger: #ef4444;
            --purple: #8b5cf6;
            --text: #f3f4f6;
            --border: #1f2937;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            padding-bottom: 90px;
        }
        .app-container {
            max-width: 480px;
            margin: auto;
        }
        /* Header Profile Neon Style */
        .header {
            display: flex;
            align-items: center;
            padding: 20px;
            background: var(--card);
            border-radius: 20px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        .header img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            margin-right: 15px;
            box-shadow: 0 0 15px var(--primary);
        }
        .header h3 { margin: 0; font-size: 18px; letter-spacing: 0.5px; color: #fff; }
        .header small { color: #9ca3af; font-weight: 500; }

        /* Stats Grid */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .stat-item {
            background: linear-gradient(135deg, #7c3aed, var(--purple));
            color: white;
            padding: 15px;
            border-radius: 14px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
            transition: transform 0.2s;
        }
        .stat-item:active { transform: scale(0.95); }

        /* Action Buttons */
        .action-btn {
            width: 100%;
            padding: 16px;
            margin: 8px 0;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .action-btn:active { transform: scale(0.98); }
        .btn-green { background: #065f46; color: #a7f3d0; border-color: #047857; }
        .btn-green:hover { background: #047857; }
        .btn-red { background: #991b1b; color: #fca5a5; border-color: #b91c1c; }
        .btn-red:hover { background: #b91c1c; }

        /* Broadcast Flex Row */
        .bc-row { display: flex; gap: 12px; margin: 8px 0; }
        .btn-purple { background: linear-gradient(135deg, #5b21b6, #6d28d9); color: white; border: none; }

        /* Deploy Input Box */
        .deploy-box {
            background: var(--card);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-top: 20px;
        }
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #05070c;
            color: white;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus { border-color: var(--primary); outline: none; }
        .btn-deploy {
            width: 100%;
            padding: 15px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,255,255,0.2);
        }

        /* Fixed Navigation Bar */
        .footer-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--card);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid var(--border);
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }
        .nav-item { color: #9ca3af; font-size: 14px; font-weight: 500; cursor: pointer; }
        .nav-active { color: var(--primary); font-weight: bold; text-shadow: 0 0 10px var(--primary); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <img src="https://i.supaimg.com/d8919cc0-dc9c-41e0-9c14-2ff75835e603/2bdd76f7-54be-4b5a-9272-44a525135848.png" alt="CYBER ENAFUL Logo">
        <div>
            <h3>AUTO REACTION BOT</h3>
            <small>Owner: ENAFUL ❤️❤️❤️</small>
        </div>
    </div>

    <div class="stat-grid">
        <div class="stat-item" onclick="sendAction('download_data')">🟪 Download Users Data</div>
        <div class="stat-item" onclick="sendAction('stats')">🟪 Statistics</div>
    </div>

    <button class="action-btn btn-green" onclick="sendAction('cust_channel')">🟩 Customize Channel Emoji <span>⚙️</span></button>
    <button class="action-btn btn-green" onclick="sendAction('cust_group')">🟩 Customize Group Emoji <span>⚙️</span></button>
    <button class="action-btn btn-green" onclick="sendAction('cust_caption')">🟩 Customize Welcome Caption <span>📝</span></button>
    <button class="action-btn btn-green" onclick="sendAction('cust_photo')">🟩 Customize Welcome Photo <span>🖼️</span></button>

    <button class="action-btn btn-red" onclick="sendAction('toggle_color')">🟥 Disable Button Color <span>❌</span></button>
    <button class="action-btn btn-red" onclick="sendAction('disable_panel')">🟥 Disable Admin Panel Button <span>🔒</span></button>
    <button class="action-btn btn-red" onclick="sendAction('toggle_force_join')">🟥 Enable Force Join <span>📢</span></button>

    <div class="bc-row">
        <button class="action-btn btn-purple" onclick="sendAction('bc_normal')">Normal Broadcast</button>
        <button class="action-btn btn-purple" onclick="sendAction('bc_powerful')">Powerful Broadcast ↗️</button>
    </div>

    <div class="deploy-box">
        <input type="text" id="tokenInput" placeholder="Enter Bot Token to Deploy...">
        <button class="btn-deploy" onclick="deployBot()">DEPLOY TO SERVER</button>
    </div>
</div>

<div class="footer-nav">
    <div class="nav-item" onclick="sendAction('nav_dashboard')">🏠 Dashboard</div>
    <div class="nav-item nav-active" onclick="sendAction('nav_commands')">⚡ Commands</div>
    <div class="nav-item" onclick="sendAction('nav_broadcast')">📢 Broadcast</div>
</div>

<script>
    // Telegram WebApp ইনিশিয়ালাইজ করা
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand(); // ফুল স্ক্রিন ওপেন হবে

    // বাটন ক্লিক ফাংশন যা Bots.Business-এ কমান্ড পাঠাবে
    function sendAction(commandName) {
        tg.sendData(commandName); 
        tg.close(); // ডাটা পাঠিয়ে প্যানেলটি বন্ধ হবে
    }

    // ডেপ্লয় ফাংশন
    function deployBot() {
        let token = document.getElementById('tokenInput').value;
        if(token) {
            tg.sendData("deploy_bot:" + token);
            tg.close();
        } else {
            alert("Please enter a valid Bot Token!");
        }
    }
</script>

</body>
</html>
